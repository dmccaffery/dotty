# GoReleaser config. Cut a release by pushing a vX.Y.Z tag (CI runs
# `goreleaser release`); build locally without publishing via `make snapshot`.
#
# Produces cross-platform binary archives + checksums + SBOMs. SBOMs are
# generated by the syft pinned in tools/go.mod (run via `go tool`, no PATH
# setup). dotty drives local hardware and Homebrew, so no container images.
version: 2

project_name: dotty

before:
    hooks:
        - go mod tidy

builds:
    - id: dotty
      main: ./cmd
      binary: dotty
      env:
          - CGO_ENABLED=0
      flags:
          - -trimpath
      ldflags:
          - -s -w
          - -X github.com/bitwise-media-group/dotty/internal/version.Version={{ .Version }}
          - -X github.com/bitwise-media-group/dotty/internal/version.Commit={{ .ShortCommit }}
          - -X github.com/bitwise-media-group/dotty/internal/version.BuildDate={{ .Date }}
      goos:
          - linux
          - darwin
      goarch:
          - amd64
          - arm64

archives:
    - id: dotty
      formats: [tar.gz]
      name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
      # Ship the LICENSE alongside the binary (explicit, not relying on defaults).
      files:
          - LICENSE

checksum:
    name_template: checksums.txt

sboms:
    - artifacts: archive
      # syft is pinned in tools/go.mod and invoked via `go tool` — no separate
      # install. GoReleaser runs the SBOM command with its working directory set
      # to dist/, hence the ../ on the modfile path.
      cmd: go
      args:
          - tool
          - -modfile=../tools/go.mod
          - syft
          - $artifact
          - --output
          - spdx-json=$document

snapshot:
    version_template: "{{ incpatch .Version }}-snapshot-{{ .ShortCommit }}"

changelog:
    sort: asc
    filters:
        exclude:
            - "^docs:"
            - "^test:"
            - "^chore:"
            - "^ci:"

release:
    github:
        owner: bitwise-media-group
        name: dotty
